<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azure Administrator Mock Exam</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e2e0d8;
    --border2: #cccab8;
    --text: #1a1917;
    --text2: #6b6960;
    --text3: #9e9c93;
    --blue: #1a56db;
    --blue-bg: #eff4ff;
    --blue-border: #a4bcfd;
    --green: #057a55;
    --green-bg: #f0fdf4;
    --green-border: #6ee7b7;
    --red: #c81e1e;
    --red-bg: #fef2f2;
    --red-border: #fca5a5;
    --amber: #92400e;
    --amber-bg: #fffbeb;
    --amber-border: #fcd34d;
    --accent: #1a56db;
    --radius: 10px;
    --radius-lg: 16px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 15px;
    color: var(--text);
  }
  .header-logo svg { width: 24px; height: 24px; }
  .header-badge {
    background: var(--blue-bg);
    color: var(--blue);
    font-size: 12px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 99px;
    border: 1px solid var(--blue-border);
  }

  /* Progress */
  .progress-section {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 2rem;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .progress-label { font-size: 13px; color: var(--text2); }
  .progress-count { font-size: 13px; font-weight: 500; color: var(--text); }
  .progress-bar-bg {
    background: var(--surface2);
    border-radius: 99px;
    height: 5px;
    overflow: hidden;
  }
  .progress-bar-fill {
    background: var(--blue);
    height: 100%;
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* Main layout */
  .main {
    max-width: 780px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* Question card */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2rem;
    margin-bottom: 1.5rem;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .q-topic {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    padding: 3px 10px;
    border-radius: 99px;
    margin-bottom: 1rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .q-text {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.65;
    color: var(--text);
    margin-bottom: 1.25rem;
    white-space: pre-line;
  }
  .multi-hint {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--amber);
    background: var(--amber-bg);
    border: 1px solid var(--amber-border);
    padding: 6px 12px;
    border-radius: var(--radius);
    margin-bottom: 1rem;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    background: var(--surface);
    user-select: none;
  }
  .option:hover { border-color: var(--border2); background: var(--surface2); }
  .option.selected { border-color: var(--blue); background: var(--blue-bg); }
  .option.correct { border-color: var(--green); background: var(--green-bg); }
  .option.wrong { border-color: var(--red); background: var(--red-bg); }
  .option.reveal { border-color: var(--green); background: var(--green-bg); opacity: 0.75; }

  .opt-circle {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    flex-shrink: 0;
    transition: all 0.15s;
    color: var(--text2);
    background: var(--surface);
    margin-top: 1px;
  }
  .option.selected .opt-circle { border-color: var(--blue); background: var(--blue); color: #fff; }
  .option.correct .opt-circle { border-color: var(--green); background: var(--green); color: #fff; }
  .option.wrong .opt-circle { border-color: var(--red); background: var(--red); color: #fff; }
  .option.reveal .opt-circle { border-color: var(--green); background: var(--green); color: #fff; }

  .opt-text { font-size: 14px; line-height: 1.55; flex: 1; padding-top: 3px; }

  /* Feedback */
  .feedback {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-top: 1rem;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.5;
    animation: fadeIn 0.2s ease;
  }
  .feedback.correct { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green); }
  .feedback.wrong { background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red); }
  .feedback-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

  /* Nav */
  .nav-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    color: var(--text);
    transition: all 0.15s;
  }
  .btn:hover:not(:disabled) { background: var(--surface2); border-color: var(--border2); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-primary { background: var(--blue); border-color: var(--blue); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #1447c0; border-color: #1447c0; }
  .btn-success { background: var(--green); border-color: var(--green); color: #fff; }
  .btn-success:hover:not(:disabled) { background: #046043; border-color: #046043; }
  .spacer { flex: 1; }
  .q-num-display {
    font-size: 13px;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
  }

  /* Question dots nav */
  .dots-nav {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
  }
  .dots-nav-title { font-size: 12px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .dots-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .dot {
    width: 30px;
    height: 30px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text2);
  }
  .dot:hover { border-color: var(--blue); color: var(--blue); }
  .dot.current { border-color: var(--blue); background: var(--blue); color: #fff; }
  .dot.answered-correct { border-color: var(--green); background: var(--green-bg); color: var(--green); }
  .dot.answered-wrong { border-color: var(--red); background: var(--red-bg); color: var(--red); }
  .dot.skipped { border-color: var(--border2); }

  /* Score screen */
  .score-screen {
    animation: fadeIn 0.3s ease;
  }
  .score-hero {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2.5rem 2rem;
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .score-ring {
    width: 120px;
    height: 120px;
    margin: 0 auto 1.5rem;
    position: relative;
  }
  .score-ring svg { width: 120px; height: 120px; transform: rotate(-90deg); }
  .score-ring-pct {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .score-ring-num { font-size: 28px; font-weight: 600; color: var(--text); line-height: 1; }
  .score-ring-label { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .score-verdict { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .score-sub { font-size: 14px; color: var(--text2); }

  .score-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    text-align: center;
  }
  .stat-val { font-size: 26px; font-weight: 600; margin-bottom: 2px; }
  .stat-lbl { font-size: 12px; color: var(--text2); }

  .score-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }

  /* Review */
  .review-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 1rem;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .review-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .review-icon {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .review-icon.correct { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .review-icon.wrong { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .review-body { flex: 1; min-width: 0; }
  .review-topic { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
  .review-q { font-size: 13px; color: var(--text); margin-bottom: 6px; }
  .review-answers { display: flex; gap: 8px; flex-wrap: wrap; font-size: 12px; }
  .review-ans-chip {
    padding: 2px 10px;
    border-radius: 99px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
  }
  .chip-yours { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); }
  .chip-correct { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green); }
</style>
</head>

<header class="header">
  <div class="header-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
    </svg>
    Azure Administrator Mock Exam
  </div>
  <div class="header-badge" id="header-badge">AZ-104</div>
</header>

<div class="progress-section" id="progress-section">
  <div class="progress-info">
    <span class="progress-label" id="progress-label">Question 1 of 60</span>
    <span class="progress-count" id="progress-answered">0 answered</span>
  </div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
</div>

<main class="main" id="main"></main>

<script>
const LABELS = ['A','B','C','D','E'];
const QUESTIONS = [
  { id:1, topic:"Topic 1", text:"Your company has an Azure AD tenant configured for hybrid coexistence with on-premises AD. You have PowerShell scripts to automate configuration of newly created VMs and plan to create several new VMs. You need a solution that ensures the scripts are run on the new VMs.\n\nWhich is the best solution?", multi:false, options:["Configure a SetupComplete.cmd batch file in the %windir%\\setup\\scripts directory.","Configure a GPO to run the scripts as logon scripts.","Configure a GPO to run the scripts as startup scripts.","Place the scripts in a new virtual hard disk (VHD)."], answer:[0] },
  { id:2, topic:"Topic 1", text:"You configure a reference VM on-premises, generalize it to create an image, and need to upload the image to Azure so it is available when creating new Azure VMs.\n\nWhich PowerShell cmdlet should you use?", multi:false, options:["Add-AzVM","Add-AzVhd","Add-AzImage","Add-AzImageDataDisk"], answer:[1] },
  { id:3, topic:"Topic 1", text:"VirtualNetworkA has a VPN gateway (static routing) with a site-to-site VPN to on-premises. A point-to-site VPN is configured from a Windows 10 workstation to VirtualNetworkA. After peering VirtualNetworkA and VirtualNetworkB, you can access VirtualNetworkB from on-premises but NOT from the Windows 10 workstation.\n\nSolution: You choose the Allow gateway transit setting on VirtualNetworkA.\nDoes this meet the goal?", multi:false, options:["Yes","No"], answer:[1] },
  { id:4, topic:"Topic 1", text:"VirtualNetworkA has a VPN gateway (static routing) with a site-to-site VPN to on-premises. A point-to-site VPN is configured from a Windows 10 workstation to VirtualNetworkA. After peering, you can access VirtualNetworkB from on-premises but NOT from the workstation.\n\nSolution: You choose the Allow gateway transit setting on VirtualNetworkB.\nDoes this meet the goal?", multi:false, options:["Yes","No"], answer:[1] },
  { id:5, topic:"Topic 1", text:"VirtualNetworkA has a VPN gateway (static routing) with a site-to-site VPN to on-premises. A point-to-site VPN is configured from a Windows 10 workstation to VirtualNetworkA. After peering, you can access VirtualNetworkB from on-premises but NOT from the workstation.\n\nSolution: You download and re-install the VPN client configuration package on the Windows 10 workstation.\nDoes this meet the goal?", multi:false, options:["Yes","No"], answer:[0] },
  { id:6, topic:"Topic 1", text:"Your company has VMs hosted in Azure on VNet1. Remote workers require access to the VMs on VNet1.\n\nWhat should you do?", multi:false, options:["Configure a Site-to-Site (S2S) VPN.","Configure a VNet-to-VNet VPN.","Configure a Point-to-Site (P2S) VPN.","Configure DirectAccess on a Windows Server 2012 VM.","Configure a Multi-Site VPN"], answer:[2] },
  { id:7, topic:"Topic 1", text:"You have a SQL Server Always On availability group on Azure VMs. You need to configure an Azure internal load balancer as a listener.\n\nSolution: You create an HTTP health probe on port 1433.\nDoes this meet the goal?", multi:false, options:["Yes","No"], answer:[1] },
  { id:8, topic:"Topic 1", text:"You have a SQL Server Always On availability group on Azure VMs. You need to configure an Azure internal load balancer as a listener.\n\nSolution: You set Session persistence to Client IP.\nDoes this meet the goal?", multi:false, options:["Yes","No"], answer:[1] },
  { id:9, topic:"Topic 1", text:"You have a SQL Server Always On availability group on Azure VMs. You need to configure an Azure internal load balancer as a listener.\n\nSolution: You enable Floating IP.\nDoes this meet the goal?", multi:false, options:["Yes","No"], answer:[0] },
  { id:10, topic:"Topic 1", text:"You plan to migrate an application to two Azure VMs on a single subnet in an Azure virtual network. You need to configure the two VMs with static internal IP addresses.\n\nWhat should you do?", multi:false, options:["Run the New-AzureRMVMConfig PowerShell cmdlet.","Run the Set-AzureSubnet PowerShell cmdlet.","Modify the VM properties in the Azure Management Portal.","Modify the IP properties in Windows Network and Sharing Center.","Run the Set-AzureStaticVNetIP PowerShell cmdlet."], answer:[2] },
  { id:11, topic:"Topic 1", text:"You need to deploy five VMs to your company's virtual network subnet. The VMs will each have both a public and private IP address. Inbound and outbound security rules for all VMs must be identical.\n\nWhat is the least number of network interfaces needed?", multi:false, options:["5","10","20","40"], answer:[0] },
  { id:12, topic:"Topic 1", text:"You need to deploy five VMs to your company's virtual network subnet. The VMs will each have both a public and private IP address. Inbound and outbound security rules for all VMs must be identical.\n\nWhat is the least number of security groups needed?", multi:false, options:["4","3","2","1"], answer:[3] },
  { id:13, topic:"Topic 1", text:"One of your Azure VMs running Windows Server 2016 is backed up daily using Azure Backup Instant Restore. The VM becomes infected with data encrypting ransomware and you need to recover the VM's files.\n\nWhich of the following is TRUE?", multi:false, options:["You can only recover the files to the infected VM.","You can recover the files to any VM within the company's subscription.","You can only recover the files to a new VM.","You will not be able to recover the files."], answer:[1] },
  { id:14, topic:"Topic 1", text:"One of your Azure VMs running Windows Server 2016 is backed up daily using Azure Backup Instant Restore. The VM becomes infected with ransomware and you need to restore the VM.\n\nWhat should you do?", multi:false, options:["Restore the VM after deleting the infected VM.","Restore the VM to any VM within the company's subscription.","Restore the VM to a new Azure VM.","Restore the VM to an on-premise Windows device."], answer:[2] },
  { id:15, topic:"Topic 1", text:"You administer an Azure solution that is having performance issues. You need to find the cause pertaining to metrics on the Azure infrastructure.\n\nWhich tool should you use?", multi:false, options:["Azure Traffic Analytics","Azure Monitor","Azure Activity Log","Azure Advisor"], answer:[1] },
  { id:16, topic:"Topic 1", text:"Your Azure subscription includes a Recovery Services vault. You want to use Azure Backup to schedule a backup of VMs to the vault.\n\nWhich of the following VMs can you back up? (Select ALL that apply)", multi:true, options:["VMs that run Windows 10.","VMs that run Windows Server 2012 or higher.","VMs that have NOT been shut down.","VMs that run Debian 8.2+.","VMs that have been shut down."], answer:[0,1,2,3,4] },
  { id:17, topic:"Topic 1", text:"You have an Azure AD tenant named contoso.com and a CSV file containing names and email addresses of 500 external users. You need to create a guest user account for each.\n\nSolution: You create a PowerShell script that runs the New-AzureADUser cmdlet for each user.\nDoes this meet the goal?", multi:false, options:["Yes","No"], answer:[1] },
  { id:18, topic:"Topic 1", text:"You have an Azure AD tenant named contoso.com and a CSV file containing names and email addresses of 500 external users. You need to create a guest user account for each.\n\nSolution: From Azure AD in the Azure portal, you use the Bulk create user operation.\nDoes this meet the goal?", multi:false, options:["Yes","No"], answer:[1] },
  { id:19, topic:"Topic 1", text:"You have an Azure AD tenant named contoso.com and a CSV file containing names and email addresses of 500 external users. You need to create a guest user account for each.\n\nSolution: You create a PowerShell script that runs the New-AzureADMSInvitation cmdlet for each external user.\nDoes this meet the goal?", multi:false, options:["Yes","No"], answer:[0] },
  { id:20, topic:"Topic 2", text:"You have an Azure AD tenant with 100 user accounts and you purchase 10 Azure AD Premium P2 licenses. You need to ensure 10 users can use all Azure AD Premium features.\n\nWhat should you do?", multi:false, options:["From the Licenses blade of Azure AD, assign a license","From the Groups blade of each user, invite the users to a group","From the Azure AD domain, add an enterprise application","From the Directory role blade of each user, modify the directory role"], answer:[0] },
  { id:21, topic:"Topic 2", text:"You have an Azure subscription and an on-premises deployment of Microsoft System Center Service Manager. You need to ensure an alert is set in Service Manager when available memory on VM1 falls below 10 percent.\n\nWhat should you do first?", multi:false, options:["Create an automation runbook","Deploy a function app","Deploy the IT Service Management Connector (ITSM)","Create a notification"], answer:[2] },
  { id:22, topic:"Topic 2", text:"You sign up for Azure AD Premium P2. You need to add admin1@contoso.com as an administrator on all computers that will be joined to the Azure AD domain.\n\nWhat should you configure in Azure AD?", multi:false, options:["Device settings from the Devices blade","Providers from the MFA Server blade","User settings from the Users blade","General settings from the Groups blade"], answer:[0] },
  { id:23, topic:"Topic 2", text:"User1 has the Reader, Security Admin, and Security Reader roles on Subscription1. VNet1 is in resource group RG1. You need to ensure User1 can assign the Reader role for VNet1 to other users.\n\nWhat should you do?", multi:false, options:["Remove User1 from Security Reader and Reader roles for Subscription1.","Assign User1 the User Access Administrator role for VNet1.","Assign User1 the Network Contributor role for VNet1.","Assign User1 the Network Contributor role for RG1."], answer:[1] },
  { id:24, topic:"Topic 2", text:"You have an Azure AD tenant named contosocloud.onmicrosoft.com. Your company has a public DNS zone for contoso.com. You add contoso.com as a custom domain name to Azure AD. You need to ensure Azure can verify the domain name.\n\nWhich type of DNS record should you create?", multi:false, options:["MX","NSEC","PTR","RRSIG"], answer:[0] },
  { id:25, topic:"Topic 2", text:"Adatum contains a group named Developers. Subscription1 contains a resource group named Dev. You need to provide Developers with the ability to create Azure logic apps in the Dev resource group.\n\nSolution: On Subscription1, you assign the DevTest Labs User role to the Developers group.\nDoes this meet the goal?", multi:false, options:["Yes","No"], answer:[1] },
  { id:26, topic:"Topic 2", text:"Adatum contains a group named Developers. Subscription1 contains a resource group named Dev. You need to provide Developers with the ability to create Azure logic apps in the Dev resource group.\n\nSolution: On Subscription1, you assign the Logic App Operator role to the Developers group.\nDoes this meet the goal?", multi:false, options:["Yes","No"], answer:[1] },
  { id:27, topic:"Topic 2", text:"Adatum contains a group named Developers. Subscription1 contains a resource group named Dev. You need to provide Developers with the ability to create Azure logic apps in the Dev resource group.\n\nSolution: On Dev, you assign the Contributor role to the Developers group.\nDoes this meet the goal?", multi:false, options:["Yes","No"], answer:[0] },
  { id:28, topic:"Topic 2", text:"You have an Azure Log Analytics workspace named Workspace1. You need to view the error events from a table named Event.\n\nWhich query should you run?", multi:false, options:['select * from Event where EventType == "error"','Event | search "error"','Event | where EventType is "error"','Get-Event Event | where {$_.EventType == "error"}'], answer:[1] },
  { id:29, topic:"Topic 2", text:"You have an Azure App Services web app named App1. You plan to deploy App1 by using Web Deploy. Developers need to use their Azure AD credentials to deploy content. The solution must use the principle of least privilege.\n\nWhat should you do?", multi:false, options:["Assign the Owner role to the developers","Configure app-level credentials for FTPS","Assign the Website Contributor role to the developers","Configure user-level credentials for FTPS"], answer:[2] },
  { id:30, topic:"Topic 2", text:"You have an Azure AD tenant named contoso.com and a CSV file containing names and email addresses of 500 external users. You need to create a guest user account for each.\n\nSolution: From Azure AD in the Azure portal, you use the Bulk invite users operation.\nDoes this meet the goal?", multi:false, options:["Yes","No"], answer:[1] },

let current = 0;
let userAnswers = QUESTIONS.map(() => []);
let submitted = new Array(QUESTIONS.length).fill(false);
let showScore = false;

function isCorrect(i) {
  const q = QUESTIONS[i], ua = userAnswers[i];
  return q.answer.length === ua.length && q.answer.every(a => ua.includes(a));
}

function updateProgress() {
  const answered = submitted.filter(Boolean).length;
  const pct = (answered / QUESTIONS.length * 100).toFixed(1);
  document.getElementById('progress-label').textContent = showScore ? 'Exam complete' : `Question ${current+1} of ${QUESTIONS.length}`;
  document.getElementById('progress-answered').textContent = `${answered} answered`;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function renderDots() {
  return `<div class="dots-nav">
    <div class="dots-nav-title">Jump to question</div>
    <div class="dots-grid">
      ${QUESTIONS.map((_, i) => {
        let cls = 'dot';
        if (i === current) cls += ' current';
        else if (submitted[i]) cls += isCorrect(i) ? ' answered-correct' : ' answered-wrong';
        return `<div class="${cls}" onclick="goTo(${i})" title="Q${i+1}">${i+1}</div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderQuestion() {
  const q = QUESTIONS[current];
  const ua = userAnswers[current];
  const done = submitted[current];

  const optionsHtml = q.options.map((opt, i) => {
    let cls = 'option';
    if (done) {
      const isCor = q.answer.includes(i);
      const isSel = ua.includes(i);
      if (isSel && isCor) cls += ' correct';
      else if (isSel && !isCor) cls += ' wrong';
      else if (!isSel && isCor) cls += ' reveal';
    } else {
      if (ua.includes(i)) cls += ' selected';
    }
    return `<div class="${cls}" onclick="toggleOption(${i})">
      <div class="opt-circle">${LABELS[i]}</div>
      <div class="opt-text">${opt}</div>
    </div>`;
  }).join('');

  let feedbackHtml = '';
  if (done) {
    const cor = isCorrect(current);
    const correctLabels = q.answer.map(a => LABELS[a]).join(', ');
    feedbackHtml = `<div class="feedback ${cor ? 'correct' : 'wrong'}">
      <span class="feedback-icon">${cor ? '✓' : '✗'}</span>
      <span>${cor ? 'Correct!' : `Incorrect.`} Correct answer: <strong>${correctLabels}</strong></span>
    </div>`;
  }

  const isLast = current === QUESTIONS.length - 1;
  const canSubmit = ua.length > 0 && !done;

  return `
    ${renderDots()}
    <div class="q-card">
      <div class="q-topic">${q.topic}</div>
      <div class="q-text">${q.text}</div>
      ${q.multi ? '<div class="multi-hint">⚠ Multiple answers may be correct — select all that apply.</div>' : ''}
      <div class="options">${optionsHtml}</div>
      ${feedbackHtml}
    </div>
    <div class="nav-row">
      <button class="btn" onclick="goTo(${current-1})" ${current===0?'disabled':''}>← Previous</button>
      <button class="btn btn-primary" onclick="submitAnswer()" ${canSubmit?'':'disabled'}>Submit answer</button>
      ${done ? `<button class="btn" onclick="goTo(${current+1})" ${isLast?'disabled':''}>Next →</button>` : ''}
      <div class="spacer"></div>
      ${isLast && done ? `<button class="btn btn-success" onclick="finishExam()">View score →</button>` : ''}
      <span class="q-num-display">${current+1}/${QUESTIONS.length}</span>
    </div>
  `;
}

function renderScore() {
  let correct = 0;
  QUESTIONS.forEach((_, i) => { if (isCorrect(i)) correct++; });
  const total = QUESTIONS.length;
  const answered = submitted.filter(Boolean).length;
  const pct = Math.round(correct / total * 100);
  const pass = pct >= 70;
  const circumference = 2 * Math.PI * 52;
  const dashOffset = circumference - (pct / 100) * circumference;
  const ringColor = pass ? '#057a55' : '#c81e1e';

  const reviewHtml = QUESTIONS.map((q, i) => {
    const cor = isCorrect(i);
    const yourLabels = userAnswers[i].length ? userAnswers[i].map(a => LABELS[a]).join(', ') : '—';
    const correctLabels = q.answer.map(a => LABELS[a]).join(', ');
    const preview = q.text.replace(/\n/g,' ').substring(0, 100) + '…';
    return `<div class="review-item">
      <div class="review-icon ${cor ? 'correct' : 'wrong'}">${cor ? '✓' : '✗'}</div>
      <div class="review-body">
        <div class="review-topic">${q.topic}</div>
        <div class="review-q">${preview}</div>
        <div class="review-answers">
          <span style="font-size:12px;color:var(--text2);">Your answer:</span>
          <span class="review-ans-chip chip-yours">${yourLabels}</span>
          <span style="font-size:12px;color:var(--text2);">Correct:</span>
          <span class="review-ans-chip chip-correct">${correctLabels}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  return `<div class="score-screen">
    <div class="score-hero">
      <div class="score-ring">
        <svg viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="52" fill="none" stroke="#e2e0d8" stroke-width="10"/>
          <circle cx="60" cy="60" r="52" fill="none" stroke="${ringColor}" stroke-width="10"
            stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}"
            stroke-linecap="round" style="transition:stroke-dashoffset 1s ease"/>
        </svg>
        <div class="score-ring-pct">
          <div class="score-ring-num">${pct}%</div>
          <div class="score-ring-label">score</div>
        </div>
      </div>
      <div class="score-verdict" style="color:${pass?'var(--green)':'var(--red)'}">${pass ? '🎉 Pass' : 'Needs improvement'}</div>
      <div class="score-sub">You scored ${correct} out of ${total} questions correctly</div>
    </div>
    <div class="score-stats">
      <div class="stat-card"><div class="stat-val" style="color:var(--green)">${correct}</div><div class="stat-lbl">Correct</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--red)">${total - correct}</div><div class="stat-lbl">Incorrect</div></div>
      <div class="stat-card"><div class="stat-val">${answered}</div><div class="stat-lbl">Answered</div></div>
      <div class="stat-card"><div class="stat-val">${total - answered}</div><div class="stat-lbl">Skipped</div></div>
    </div>
    <div class="score-actions">
      <button class="btn btn-primary" onclick="restartExam()">↺ Restart exam</button>
      <button class="btn" onclick="goTo(0); showScore=false; render();">← Review questions</button>
    </div>
    <div class="review-title">Question-by-question review</div>
    ${reviewHtml}
    <div style="margin-top:1.5rem; text-align:center;">
      <button class="btn btn-primary" onclick="restartExam()">↺ Restart exam</button>
    </div>
  </div>`;
}

function render() {
  document.getElementById('main').innerHTML = showScore ? renderScore() : renderQuestion();
  updateProgress();
}

function toggleOption(i) {
  if (submitted[current]) return;
  const q = QUESTIONS[current];
  const ua = userAnswers[current];
  if (q.multi) {
    const idx = ua.indexOf(i);
    idx === -1 ? ua.push(i) : ua.splice(idx, 1);
  } else {
    userAnswers[current] = [i];
  }
  render();
}

function submitAnswer() {
  if (userAnswers[current].length === 0 || submitted[current]) return;
  submitted[current] = true;
  render();
}

function goTo(i) {
  if (i < 0 || i >= QUESTIONS.length) return;
  current = i;
  render();
}

function finishExam() {
  showScore = true;
  render();
}

function restartExam() {
  current = 0;
  userAnswers = QUESTIONS.map(() => []);
  submitted = new Array(QUESTIONS.length).fill(false);
  showScore = false;
  render();
}

render();
</script>
